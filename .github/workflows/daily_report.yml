name: Pitinvest Daily Report

on:
  schedule:
    # 한국 시간 기준: 아침 07:30 (월~금), 오후 17:00 (월~금)
    - cron: '30 22 * * 0-4' 
    - cron: '0 8 * * 1-5'   
  workflow_dispatch: 

name: Pitinvest Daily Report

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run main script
        env:
          # 깃허브 Secrets에 저장된 토큰을 불러와 파이썬으로 넘겨줍니다.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
