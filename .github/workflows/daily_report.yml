name: Pitinvest Daily Report

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3에서 v4로 최신화 완료!
      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 최신화 완료!
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance pytz
      - name: Run main script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
